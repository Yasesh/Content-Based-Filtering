<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Course Recommendation System</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <nav>
        <a href="/" class="logo">
            <span>🎓</span> AI Course Finder
        </a>
    </nav>

    <div class="hero">
        <h1>Find Your Next Course</h1>
        <p>Discover personalized learning paths powered by Advanced Machine Learning.</p>
    </div>

    <main>
        <div class="search-container">
            <form action="/recommend" method="POST" class="search-form">
                <div class="form-group">
                    <label for="topic">Interests / Keywords</label>
                    <input type="text" id="topic" name="topic" class="form-control" placeholder="e.g., Python, UI Design, Blockchain" required>
                </div>

                <div class="form-group">
                    <label for="level">Difficulty Level</label>
                    <select id="level" name="level" class="form-control">
                        <option value="Any" selected>Any Level</option>
                        <option value="Beginner">Beginner</option>
                        <option value="Intermediate">Intermediate</option>
                        <option value="Advanced">Advanced</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="model_type">Recommendation Model</label>
                    <select id="model_type" name="model_type" class="form-control">
                        <option value="content" selected>Content-Based Filtering</option>
                        <option value="collaborative">Collaborative Filtering</option>
                        <option value="hybrid">Hybrid Model</option>
                    </select>
                </div>

                <button type="submit" class="btn-primary">
                    Get Recommendations
                </button>
            </form>
        </div>
    </main>

    <div class="loading-overlay">
        <div class="spinner"></div>
        <p>Analyzing profiles and finding best matches...</p>
    </div>

    <footer>
        <div class="footer-content">
            <p>&copy; 2026 AI Course Recommendation System. Built with Flask and Scikit-Learn.</p>
        </div>
    </footer>

    <script src="/static/scripts.js"></script>
</body>
</html>
